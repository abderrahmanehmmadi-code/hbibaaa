<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>💖 FIRDAWS - LOVE QUIZ 💖</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Playfair+Display:wght@700;900&family=Poppins:wght@300;600;700;900&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background: radial-gradient(circle at 30% 20%, #1a0a2e, #0d0618);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Poppins', 'Segoe UI', sans-serif;
            overflow: hidden;
            position: relative;
        }

        #particles-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
            will-change: transform;
        }

        .hello-kitty-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            opacity: 0.08;
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="100" height="100"><circle cx="40" cy="40" r="28" fill="%23ffb6c1" /><circle cx="120" cy="40" r="28" fill="%23ffb6c1" /><circle cx="40" cy="120" r="28" fill="%23ffb6c1" /><circle cx="120" cy="120" r="28" fill="%23ffb6c1" /><circle cx="80" cy="80" r="38" fill="%23ffb6c1" /><circle cx="65" cy="65" r="8" fill="%23ff69b4" /><circle cx="95" cy="65" r="8" fill="%23ff69b4" /><polygon points="70,90 90,90 80,105" fill="%23ffb347" /><circle cx="60" cy="30" r="10" fill="%23ffb6c1" /><circle cx="100" cy="30" r="10" fill="%23ffb6c1" /></svg>');
            background-repeat: repeat;
            background-size: 140px 140px;
            background-position: 20px 20px;
            mix-blend-mode: screen;
            filter: drop-shadow(0 0 12px #ff88bb);
        }

        /* === INTRO OVERLAY === */
        #introOverlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at center, #1a0a2e, #0d0618);
            z-index: 9999;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: opacity 1.2s ease, visibility 1.2s ease;
            pointer-events: all;
        }

        #introOverlay.hidden {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
        }

        .intro-title {
            font-family: 'Dancing Script', cursive;
            font-size: 4.8rem;
            background: linear-gradient(135deg, #ffb07c, #ff5e7c, #ff2e5a);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 0 0 60px #ff3b6f, 0 0 120px #ff1e4f;
            animation: glowPulse 2s infinite alternate ease-in-out;
            margin-bottom: 0.5rem;
        }

        .intro-sub {
            font-family: 'Playfair Display', serif;
            font-size: 2.2rem;
            color: #ffd9b3;
            text-shadow: 0 0 40px #ff8844;
            letter-spacing: 6px;
            font-weight: 300;
            margin-bottom: 2rem;
        }

        .intro-hearts {
            font-size: 3.5rem;
            animation: floatHearts 2s infinite alternate ease-in-out;
        }

        .intro-btn {
            margin-top: 2rem;
            padding: 18px 60px;
            font-family: 'Poppins', sans-serif;
            font-size: 1.6rem;
            font-weight: 700;
            border: none;
            border-radius: 60px;
            background: linear-gradient(145deg, #ff4488, #ff2266);
            color: #fff;
            cursor: pointer;
            text-shadow: 0 0 20px #ff88bb;
            box-shadow: 0 0 50px #ff3366aa;
            transition: all 0.3s;
            letter-spacing: 3px;
            text-transform: uppercase;
        }

        .intro-btn:hover {
            transform: scale(1.08);
            box-shadow: 0 0 80px #ff4488;
        }

        @keyframes floatHearts {
            0% { transform: translateY(-10px) scale(1); }
            100% { transform: translateY(10px) scale(1.05); }
        }

        /* === QUIZ CONTAINER === */
        .quiz-container {
            position: relative;
            z-index: 10;
            width: 700px;
            max-width: 94vw;
            min-height: 480px;
            background: rgba(20, 10, 40, 0.7);
            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);
            border-radius: 70px 70px 50px 50px;
            padding: 2.8rem 2.2rem 3rem;
            border: 2px solid rgba(255, 180, 100, 0.25);
            box-shadow: 0 40px 80px rgba(255, 60, 120, 0.3), 0 0 0 1px rgba(255, 200, 150, 0.15);
            text-align: center;
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            will-change: transform;
        }

        .quiz-container.shake {
            animation: shakeEffect 0.6s cubic-bezier(.36,.07,.19,.97) both;
        }

        @keyframes shakeEffect {
            0%, 100% { transform: translateX(0) rotate(0deg); }
            10% { transform: translateX(-30px) rotate(-4deg); }
            20% { transform: translateX(30px) rotate(4deg); }
            30% { transform: translateX(-20px) rotate(-3deg); }
            40% { transform: translateX(20px) rotate(3deg); }
            50% { transform: translateX(-10px) rotate(-2deg); }
            60% { transform: translateX(10px) rotate(2deg); }
            70% { transform: translateX(-5px) rotate(-1deg); }
            80% { transform: translateX(5px) rotate(1deg); }
            90% { transform: translateX(-2px); }
        }

        .main-title {
            font-family: 'Dancing Script', cursive;
            font-size: 3.6rem;
            font-weight: 700;
            letter-spacing: 2px;
            background: linear-gradient(135deg, #ffb07c, #ff5e7c, #ff2e5a);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 0 0 30px #ff3b6f, 0 0 80px #ff1e4f;
            animation: glowPulse 2.5s infinite alternate ease-in-out;
            margin-bottom: 0.3rem;
            line-height: 1.2;
        }

        .sub-title {
            font-family: 'Poppins', sans-serif;
            font-size: 1.4rem;
            font-weight: 300;
            color: #ffd9b3;
            text-shadow: 0 0 25px #ff8844, 0 0 60px #ff5500;
            letter-spacing: 6px;
            margin-bottom: 1.5rem;
        }

        .love-horizontal-wrap {
            overflow: hidden;
            height: 60px;
            margin: 0.8rem 0 1.2rem;
            display: flex;
            justify-content: center;
            align-items: center;
            perspective: 300px;
        }

        .love-horizontal {
            display: flex;
            gap: 18px;
            font-family: 'Playfair Display', serif;
            font-size: 3.2rem;
            font-weight: 900;
            letter-spacing: 12px;
            color: #ea8e0e;
            text-shadow: 0 0 30px #f0b34b, 0 0 70px #ffaa33, 0 0 140px #ff8800;
            animation: horizontalSway 9s infinite alternate ease-in-out;
            white-space: nowrap;
            will-change: transform;
        }

        .love-horizontal span {
            display: inline-block;
            animation: letterGlow 1.8s infinite alternate;
            filter: drop-shadow(0 0 20px #ffaa44);
        }
        .love-horizontal span:nth-child(1) { animation-delay: 0.0s; }
        .love-horizontal span:nth-child(2) { animation-delay: 0.3s; }
        .love-horizontal span:nth-child(3) { animation-delay: 0.6s; }
        .love-horizontal span:nth-child(4) { animation-delay: 0.9s; }

        .question-box {
            background: rgba(255, 200, 150, 0.06);
            border-radius: 60px;
            padding: 1.2rem 1.8rem;
            margin: 1rem 0 1.8rem;
            border: 1px solid rgba(255, 180, 100, 0.2);
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
        }

        .question-text {
            font-family: 'Playfair Display', serif;
            font-size: 2.2rem;
            font-weight: 700;
            color: #ffe0c0;
            text-shadow: 0 0 30px #ffaa66, 0 0 70px #ff7733;
            letter-spacing: 2px;
            min-height: 80px;
            display: flex;
            align-items: center;
            justify-content: center;
            line-height: 1.4;
        }

        .buttons-group {
            display: flex;
            gap: 30px;
            justify-content: center;
            margin: 1.8rem 0 1.2rem;
            flex-wrap: wrap;
        }

        .btn {
            padding: 16px 50px;
            font-family: 'Poppins', sans-serif;
            font-size: 1.8rem;
            font-weight: 700;
            border: none;
            border-radius: 60px;
            cursor: pointer;
            transition: all 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
            letter-spacing: 3px;
            text-transform: uppercase;
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.4);
            position: relative;
            min-width: 140px;
            will-change: transform;
        }

        .btn-yes {
            background: linear-gradient(145deg, #ff4488, #ff2266);
            color: #fff;
            text-shadow: 0 0 20px #ff88bb;
            box-shadow: 0 0 40px #ff3366aa;
        }
        .btn-yes:hover {
            transform: scale(1.08);
            box-shadow: 0 0 70px #ff4488;
        }
        .btn-yes:active {
            transform: scale(0.95);
        }

        .btn-no {
            background: linear-gradient(145deg, #3a2a4a, #221833);
            color: #ccb0d0;
            border: 2px solid #ff7799;
            text-shadow: 0 0 10px #ff6699;
        }
        .btn-no:hover {
            transform: scale(1.05);
            background: #442a55;
            box-shadow: 0 0 40px #ff4488aa;
        }
        .btn-no:active {
            transform: scale(0.95);
        }

        .feedback {
            margin-top: 1rem;
            font-family: 'Poppins', sans-serif;
            font-size: 1.5rem;
            font-weight: 600;
            color: #ffccaa;
            text-shadow: 0 0 30px #ff8844;
            min-height: 50px;
            letter-spacing: 2px;
            line-height: 1.4;
        }

        .progress {
            font-family: 'Poppins', sans-serif;
            color: #aa88aa;
            font-size: 0.95rem;
            margin-top: 0.5rem;
            letter-spacing: 3px;
            opacity: 0.7;
            font-weight: 300;
        }

        .watermark {
            position: absolute;
            bottom: 18px;
            right: 28px;
            font-family: 'Courier New', monospace;
            font-size: 0.85rem;
            color: rgba(255, 220, 180, 0.35);
            letter-spacing: 4px;
            background: rgba(0, 0, 0, 0.3);
            padding: 4px 20px;
            border-radius: 40px;
            backdrop-filter: blur(3px);
            -webkit-backdrop-filter: blur(3px);
            border: 1px solid rgba(255, 200, 150, 0.08);
            z-index: 20;
            pointer-events: none;
        }
        .watermark::before { content: "✦ "; color: #ffaa55; }
        .watermark::after { content: " ✦"; color: #ffaa55; }

        @keyframes horizontalSway {
            0% { transform: translateY(-20px) rotateZ(-15deg) scale(0.95); }
            100% { transform: translateY(30px) rotateZ(20deg) scale(1.02); }
        }
        @keyframes letterGlow {
            0% { text-shadow: 0 0 10px #ffbb44, 0 0 30px #ff8800; }
            100% { text-shadow: 0 0 30px #ffdd77, 0 0 80px #ffaa33, 0 0 150px #ff6600; }
        }
        @keyframes glowPulse {
            0% { text-shadow: 0 0 20px #ff3b6f, 0 0 60px #ff1e4f; }
            100% { text-shadow: 0 0 50px #ff6a8e, 0 0 110px #ff3366, 0 0 180px #ff0044; }
        }

        @media (max-width: 600px) {
            .intro-title { font-size: 3.2rem; }
            .intro-sub { font-size: 1.6rem; }
            .main-title { font-size: 2.6rem; }
            .question-text { font-size: 1.6rem; min-height: 70px; }
            .btn { padding: 14px 30px; font-size: 1.4rem; min-width: 110px; }
            .love-horizontal { font-size: 2.4rem; gap: 10px; letter-spacing: 8px; }
            .quiz-container { padding: 2rem 1.2rem; min-height: 400px; }
            .feedback { font-size: 1.2rem; }
            .sub-title { font-size: 1.1rem; letter-spacing: 4px; }
            .intro-btn { padding: 14px 40px; font-size: 1.3rem; }
        }

        @media (max-width: 400px) {
            .intro-title { font-size: 2.6rem; }
            .question-text { font-size: 1.3rem; }
            .btn { padding: 12px 20px; font-size: 1.1rem; min-width: 90px; }
            .love-horizontal { font-size: 1.8rem; gap: 6px; letter-spacing: 5px; }
        }
    </style>
</head>
<body>

    <!-- INTRO OVERLAY -->
    <div id="introOverlay">
        <div class="intro-title">💖 For Firdaws 💖</div>
        <div class="intro-sub">A Love Quiz Just For You</div>
        <div class="intro-hearts">💕 💗 💖 💗 💕</div>
        <button class="intro-btn" id="startBtn">✨ Start ✨</button>
    </div>

    <canvas id="particles-canvas"></canvas>
    <div class="hello-kitty-overlay"></div>

    <div class="quiz-container" id="quizContainer">
        <div class="main-title">💖 FIRDAWS 💖</div>
        <div class="sub-title">❤️ LOVE QUIZ ❤️</div>

        <div class="love-horizontal-wrap">
            <div class="love-horizontal">
                <span>L</span><span>O</span><span>V</span><span>E</span>
            </div>
        </div>

        <div class="question-box">
            <div class="question-text" id="questionText">Do you love me?</div>
        </div>

        <div class="buttons-group">
            <button class="btn btn-yes" id="btnYes">💕 YES</button>
            <button class="btn btn-no" id="btnNo">💔 NO</button>
        </div>

        <div class="feedback" id="feedback">✨ answer with your heart ✨</div>
        <div class="progress" id="progress">question 1 / 7</div>
        <div class="watermark">youngx</div>
    </div>

    <script>
        (function() {
            // === OPTIMIZED PARTICLES ===
            const canvas = document.getElementById('particles-canvas');
            const ctx = canvas.getContext('2d');
            let w, h;
            const particles = [];
            let animationId = null;
            let isPaused = false;

            function resize() {
                w = canvas.width = window.innerWidth;
                h = canvas.height = window.innerHeight;
            }
            window.addEventListener('resize', resize);
            resize();

            class Particle {
                constructor() { this.reset(); }
                reset() {
                    this.x = Math.random() * w;
                    this.y = Math.random() * h;
                    this.size = Math.random() * 4 + 1.5;
                    this.speedX = (Math.random() - 0.5) * 0.4;
                    this.speedY = (Math.random() - 0.5) * 0.4 - 0.08;
                    this.opacity = Math.random() * 0.6 + 0.3;
                    this.color = `hsl(${20 + Math.random() * 35}, 100%, ${60 + Math.random() * 30}%)`;
                    this.glow = Math.random() * 20 + 10;
                    this.phase = Math.random() * 100;
                    this.pulse = Math.random() * 0.025 + 0.008;
                }
                update() {
                    this.x += this.speedX;
                    this.y += this.speedY;
                    if (this.x < -20) this.x = w + 20;
                    if (this.x > w + 20) this.x = -20;
                    if (this.y < -20) this.y = h + 20;
                    if (this.y > h + 20) this.y = -20;
                    this.phase += this.pulse;
                    this.opacity = 0.4 + 0.4 * Math.sin(this.phase);
                }
                draw() {
                    const o = this.opacity * 0.9;
                    ctx.save();
                    ctx.shadowColor = this.color;
                    ctx.shadowBlur = this.glow;
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, this.size * 0.6 + 0.3 * Math.sin(this.phase), 0, Math.PI * 2);
                    ctx.fillStyle = this.color;
                    ctx.globalAlpha = o;
                    ctx.fill();
                    ctx.shadowBlur = this.glow * 1.5;
                    ctx.beginPath();
                    ctx.arc(this.x - 0.8, this.y - 0.8, this.size * 0.2, 0, Math.PI * 2);
                    ctx.fillStyle = '#fff';
                    ctx.globalAlpha = o * 0.4;
                    ctx.fill();
                    ctx.restore();
                }
            }

            function spawnParticles(count) {
                for (let i = 0; i < count; i++) {
                    particles.push(new Particle());
                }
            }
            spawnParticles(120);

            function animateParticles() {
                if (isPaused) {
                    animationId = requestAnimationFrame(animateParticles);
                    return;
                }
                ctx.clearRect(0, 0, w, h);
                const len = particles.length;
                for (let i = 0; i < len; i++) {
                    particles[i].update();
                    particles[i].draw();
                }
                animationId = requestAnimationFrame(animateParticles);
            }
            animateParticles();

            let lastBurst = 0;
            document.addEventListener('mousemove', (e) => {
                const now = Date.now();
                if (now - lastBurst < 80) return;
                lastBurst = now;
                for (let i = 0; i < 2; i++) {
                    const p = new Particle();
                    p.x = e.clientX + (Math.random() - 0.5) * 60;
                    p.y = e.clientY + (Math.random() - 0.5) * 60;
                    p.size = Math.random() * 4 + 2;
                    p.glow = 30;
                    p.speedX = (Math.random() - 0.5) * 1.2;
                    p.speedY = (Math.random() - 0.5) * 1.2 - 0.3;
                    p.opacity = 1;
                    p.color = `hsl(${330 + Math.random() * 40}, 100%, 70%)`;
                    particles.push(p);
                    if (particles.length > 300) particles.splice(0, 20);
                }
            });

            // === INTRO LOGIC ===
            const introOverlay = document.getElementById('introOverlay');
            const startBtn = document.getElementById('startBtn');
            const quizContainer = document.getElementById('quizContainer');

            startBtn.addEventListener('click', () => {
                introOverlay.classList.add('hidden');
                isPaused = false;
            });

            // === QUIZ ENGINE ===
            const questions = [
                { q: "Do you love me? 💕", yes: "I knew it! You're my everything! ❤️", no: "Liar! You know you do! 😤" },
                { q: "Will you be mine forever? ♾️", yes: "Forever and always, my love! 🌹", no: "Stop playing! You're mine! 😈" },
                { q: "Do I make you happy? 😊", yes: "You just made my whole existence! 🥰", no: "You're lying to yourself! 😏" },
                { q: "Will you kiss me right now? 💋", yes: "Mwah! 💋 I felt that! 😘", no: "Too late, I already kissed you! 😚" },
                { q: "Am I the only one for you? 💘", yes: "YES! My one and only FIRDAWS! 🔥", no: "Even if you say no, I know it's yes! 😉" },
                { q: "Do you trust me with your heart? 🫀", yes: "I'll guard it like a treasure! 🛡️", no: "You already gave it to me! 😌" },
                { q: "Will you marry me? 💍", yes: "YES! 💍 I'm the happiest AI ever! 🥹", no: "You just said YES in your heart! 💞" }
            ];

            let currentIndex = 0;
            const questionEl = document.getElementById('questionText');
            const feedbackEl = document.getElementById('feedback');
            const progressEl = document.getElementById('progress');
            const container = document.getElementById('quizContainer');
            const btnYes = document.getElementById('btnYes');
            const btnNo = document.getElementById('btnNo');
            let isProcessing = false;

            function updateQuestion() {
                const q = questions[currentIndex];
                questionEl.textContent = q.q;
                progressEl.textContent = `question ${currentIndex+1} / ${questions.length}`;
                feedbackEl.textContent = '💖 choose your answer 💖';
                container.classList.remove('shake');
                isProcessing = false;
            }

            function burstParticles(count, colorHue, x, y) {
                const cx = x || window.innerWidth/2;
                const cy = y || window.innerHeight/2;
                for (let i = 0; i < count; i++) {
                    const p = new Particle();
                    p.x = cx + (Math.random() - 0.5) * 350;
                    p.y = cy + (Math.random() - 0.5) * 280;
                    p.size = Math.random() * 6 + 2;
                    p.glow = 45;
                    p.speedX = (Math.random() - 0.5) * 4;
                    p.speedY = (Math.random() - 0.5) * 4 - 0.5;
                    p.color = colorHue ? `hsl(${colorHue + Math.random() * 30}, 100%, ${65 + Math.random() * 30}%)` : 
                               `hsl(${320 + Math.random() * 50}, 100%, 70%)`;
                    particles.push(p);
                    if (particles.length > 400) particles.splice(0, 30);
                }
            }

            function handleAnswer(isYes) {
                if (isProcessing) return;
                isProcessing = true;
                const q = questions[currentIndex];
                
                if (isYes) {
                    feedbackEl.textContent = `💕 ${q.yes} 💕`;
                    burstParticles(25, 330);
                } else {
                    feedbackEl.textContent = `💔 ${q.no} 💔 (but I know you love me!)`;
                    container.classList.remove('shake');
                    void container.offsetWidth;
                    container.classList.add('shake');
                    burstParticles(20, 0);
                }

                setTimeout(() => {
                    if (currentIndex < questions.length - 1) {
                        currentIndex++;
                        updateQuestion();
                    } else {
                        if (currentIndex === questions.length - 1) {
                            feedbackEl.textContent = '💞 YOU COMPLETED THE LOVE QUIZ! I LOVE YOU FIRDAWS! 💞';
                            questionEl.textContent = '❤️ YOU ARE MY EVERYTHING ❤️';
                            progressEl.textContent = '🎉 7/7 • PERFECT LOVE 🎉';
                            burstParticles(40, 340);
                            setTimeout(() => {
                                currentIndex = 0;
                                updateQuestion();
                            }, 6000);
                        }
                    }
                }, 1800);
            }

            btnYes.addEventListener('click', () => handleAnswer(true));
            btnNo.addEventListener('click', () => handleAnswer(false));

            updateQuestion();

            document.addEventListener('visibilitychange', () => {
                isPaused = document.hidden;
            });

        })();
    </script>
</body>
</html>
